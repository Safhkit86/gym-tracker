name: gym-tracker

services:
  # --- Infrastruttura condivisa ---
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gymtracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gymtracker}
      POSTGRES_DB: ${POSTGRES_DB:-gymtracker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gymtracker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-gymtracker}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-gymtracker}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Cattura le email inviate da auth-service (reset/cambio password) in
  # locale, senza un vero server SMTP: UI su :8025, nessuna configurazione
  # necessaria (nessuna autenticazione richiesta lato client SMTP).
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8025/api/v1/info",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Microservizi ---
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${AUTH_SERVICE_PORT:-4001}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-gymtracker}:${POSTGRES_PASSWORD:-gymtracker}@postgres:5432/${POSTGRES_DB:-gymtracker}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: ${SMTP_FROM:-no-reply@gym-tracker.local}
      WEB_APP_URL: ${WEB_APP_URL:-http://localhost:5173}
    ports:
      - "${AUTH_SERVICE_PORT:-4001}:4001"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  workout-service:
    build:
      context: .
      dockerfile: services/workout-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${WORKOUT_SERVICE_PORT:-4002}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-gymtracker}:${POSTGRES_PASSWORD:-gymtracker}@postgres:5432/${POSTGRES_DB:-gymtracker}
    ports:
      - "${WORKOUT_SERVICE_PORT:-4002}:4002"
    depends_on:
      postgres:
        condition: service_healthy

  progress-service:
    build:
      context: .
      dockerfile: services/progress-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${PROGRESS_SERVICE_PORT:-4003}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-gymtracker}:${POSTGRES_PASSWORD:-gymtracker}@postgres:5432/${POSTGRES_DB:-gymtracker}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-gymtracker}:${RABBITMQ_PASSWORD:-gymtracker}@rabbitmq:5672
    ports:
      - "${PROGRESS_SERVICE_PORT:-4003}:4003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notify-service:
    build:
      context: .
      dockerfile: services/notify-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${NOTIFY_SERVICE_PORT:-4004}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-gymtracker}:${POSTGRES_PASSWORD:-gymtracker}@postgres:5432/${POSTGRES_DB:-gymtracker}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-gymtracker}:${RABBITMQ_PASSWORD:-gymtracker}@rabbitmq:5672
    ports:
      - "${NOTIFY_SERVICE_PORT:-4004}:4004"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # --- API Gateway: unico punto di ingresso per i client (web/Android) ---
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${API_GATEWAY_PORT:-4000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      AUTH_SERVICE_URL: http://auth-service:4001
      WORKOUT_SERVICE_URL: http://workout-service:4002
      PROGRESS_SERVICE_URL: http://progress-service:4003
      NOTIFY_SERVICE_URL: http://notify-service:4004
    ports:
      - "${API_GATEWAY_PORT:-4000}:4000"
    depends_on:
      - auth-service
      - workout-service
      - progress-service
      - notify-service

volumes:
  postgres-data:
